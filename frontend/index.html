<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israeli News Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="dashboard">
        <div class="col" id="col-toi">
            <h2 class="col-title">Times of Israel</h2>
            <ul class="headline-list" id="list-toi"></ul>
        </div>
        <div class="col" id="col-ynet">
            <h2 class="col-title">Ynet</h2>
            <ul class="headline-list" id="list-ynet"></ul>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/relativeTime.js"></script>
    <script>dayjs.extend(window.dayjs_plugin_relativeTime);</script>
    <script src="/static/app.js"></script>
</body>
</html>
